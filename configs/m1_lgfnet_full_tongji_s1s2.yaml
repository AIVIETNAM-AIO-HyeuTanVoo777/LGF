# Model 1: LGF-Net Full (CNN + DeiT-Tiny + Learnable Gabor) on Tongji S1 -> S2
seed: 42
device: cuda
save_dir: experiments/m1_lgfnet_full_tongji_s1s2

dataset:
  name: Tongji
  split_file: data/splits/tongji_s1_to_s2.json

sampler:
  num_identities: 4
  num_instances: 2
  fallback_identities: 4

loader:
  num_workers: 0

model:
  name: LGFNetSmall
  embedding_dim: 256
  pretrained: true

training:
  epochs: 40
  lr: 0.001
  weight_decay: 0.0001
  grad_accumulation_steps: 8
  lambda_supcon: 0.10
  temperature: 0.07
  amp: true
