# Configuration for ResNet18 Baseline on Tongji S1 -> S2 Protocol
seed: 42
device: cuda
save_dir: experiments/resnet18_ce_tongji_s1s2

dataset:
  name: Tongji
  split_file: data/splits/tongji_s1_to_s2.json

sampler:
  num_identities: 8  # P
  num_instances: 2   # K
  fallback_identities: 4

loader:
  num_workers: 0  # 0 is recommended for safety on Windows environments

model:
  name: ResNet18Baseline
  embedding_dim: 256
  pretrained: true

training:
  epochs: 2  # Keep it small (e.g. 2 epochs) for baseline validation, can be scaled up
  lr: 0.001
  weight_decay: 0.0001
  grad_accumulation_steps: 1
  lambda_supcon: 0.10
  temperature: 0.07
  amp: true
