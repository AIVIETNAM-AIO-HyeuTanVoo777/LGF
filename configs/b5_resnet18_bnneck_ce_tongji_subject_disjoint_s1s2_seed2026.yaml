# B5: ResNet18 + BNNeck + CE on Tongji palm-class-disjoint S1 -> S2, seed 2026
# Note: filenames retain historical 'subject_disjoint' naming, while the paper claim is capped at palm-class-disjoint by audit.
seed: 2026
device: cuda
save_dir: experiments/b5_resnet18_bnneck_ce_tongji_subject_disjoint_s1s2_seed2026
dataset:
  name: Tongji
  split_file: data/splits/tongji_subject_disjoint_s1_to_s2_seed2026.json
sampler:
  num_identities: 8
  num_instances: 2
  fallback_identities: 4
loader:
  num_workers: 0
model:
  name: ResNet18BNNeck
  embedding_dim: 256
  pretrained: true
  eval_embedding: post_bn
eval:
  embedding: post_bn
loss:
  name: combined
training:
  epochs: 60
  lr: 0.0001
  weight_decay: 0.0001
  grad_accumulation_steps: 4
  temperature: 0.07
  amp: true
  loss_type: combined
  lambda_supcon: 0.0
