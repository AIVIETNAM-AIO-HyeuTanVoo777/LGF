# B6: ResNet18 + BNNeck + ArcFace on Tongji subject-disjoint S1 -> S2, seed 2026
seed: 2026
device: cuda
save_dir: experiments/b6_resnet18_bnneck_arcface_tongji_subject_disjoint_s1s2_seed2026
dataset:
  name: Tongji
  split_file: data/splits/tongji_subject_disjoint_s1_to_s2_seed2026.json
sampler:
  num_identities: 8
  num_instances: 2
  fallback_identities: 4
loader:
  num_workers: 0
model:
  name: ResNet18BNNeck
  embedding_dim: 256
  pretrained: true
  eval_embedding: post_bn
eval:
  embedding: post_bn
loss:
  name: arcface
  scale: 30.0
  margin: 0.5
training:
  loss_type: arcface
  epochs: 60
  lr: 0.0001
  weight_decay: 0.0001
  grad_accumulation_steps: 4
  lambda_supcon: 0.0
  temperature: 0.07
  amp: true
