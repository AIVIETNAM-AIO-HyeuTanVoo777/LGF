project:
  name: palm_gabor_conformer_toy
  seed: 42
  output_dir: outputs
  device: cpu
  deterministic: true

dataset:
  name: TOY
  raw_dir: data/toy
  processed_dir: data/processed/TOY
  metadata_csv: data/metadata/toy_metadata.csv
  split_json: data/splits/toy_split_seed42.json
  image_size: [224, 224]
  class_target: palm_id
  split_ratio: 0.5
  drop_odd_sample: true
  split_per_class: true
  defective_policy: metadata_or_all_valid
  manual_exclusion_file: null
  gender_mapping_file: null

preprocessing:
  assume_roi: true
  roi_extractor: identity
  resize: [224, 224]
  gabor_grayscale: true
  conformer_rgb: true
  normalize_conformer:
    mean: [0.485, 0.456, 0.406]
    std: [0.229, 0.224, 0.225]

gabor:
  image_size: [224, 224]
  num_scales: 7
  orientations_deg: [0, 30, 60, 90, 120, 150]
  orientation_fusion: max
  fixed_filters: true
  formulation: spatial
  response_mode: magnitude
  scale_fusion: concat
  kernel_size: 31
  sigma: 4.0
  gamma: 0.5
  phase_offset: 0.0
  kmax: 1.57079632679
  spacing_factor: 1.41421356237
  padding: same
  pooling:
    enabled: true
    type: adaptive_avg
    output_size: [14, 14]
  normalize:
    standardize: true
    l2: true

conformer:
  image_size: 224
  in_channels: 3
  architecture_family: visual_conformer_resnet_vit_fcu
  num_classes: auto
  conv_stem_channels: 16
  embed_dim: 32
  depth: 2
  num_heads: 2
  mlp_ratio: 2.0
  patch_size: 16
  feature_dim: 32
  fcu_stages: [1, 2]
  dropout: 0.0
  attn_dropout: 0.0
  drop_path: 0.0
  pretrained: false
  checkpoint_path: outputs/checkpoints/TOY/best_conformer.pt

training:
  batch_size: 4
  optimizer: adam
  lr: 1.0e-4
  scheduler: cosine_annealing
  min_lr: 5.0e-6
  epochs: 3
  weight_decay: 0.0
  loss: cross_entropy
  num_workers: 0
  mixed_precision: false
  save_best_by: val_accuracy

features:
  cache_dir: outputs/features
  save_format: npz
  l2_normalize: true

kcca:
  supported_kernels: [cosine, rbf, laplacian]
  kernel: cosine
  n_components: 8
  reg: 1.0e-3
  center_kernels: true
  pre_reduce: true
  reducer: pca
  x_reduce_dim: 16
  y_reduce_dim: 8
  fusion_strategy: sum
  l2_normalize_output: true
  save_path: outputs/kcca/TOY/kcca_cosine_seed42.pkl

graph:
  enabled: true
  structure: gender_hand_palmid
  use_gender: true
  use_hand_side: true
  use_age: false
  unknown_policy: fallback
  graph_walk_mode: exhaustive_partition_search
  save_path: outputs/graphs/TOY_graph.pkl

matcher:
  type: cosine
  threshold: null
  fallback_global: true
  one_stage: false

evaluation:
  metrics: [accuracy, precision, recall, f1]
  average: macro
  save_confusion_matrix: true
  timing: true
  report_dir: outputs/reports

experiment:
  name: toy_fused_cosine_kcca_two_stage
  mode: full_pipeline
  compare_features: [gabor, conformer, fused]
  compare_kernels: [laplacian, rbf, cosine]
  matcher_for_feature_comparison: euclidean
