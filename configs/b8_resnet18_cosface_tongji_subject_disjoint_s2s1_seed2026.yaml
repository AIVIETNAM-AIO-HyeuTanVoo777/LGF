# B8: ResNet18 + CosFace on Tongji palm-class-disjoint S2 -> S1, seed 2026
seed: 2026
device: cuda
save_dir: experiments/b8_resnet18_cosface_tongji_subject_disjoint_s2s1_seed2026
dataset:
  name: Tongji
  split_file: data/splits/tongji_subject_disjoint_s2_to_s1_seed2026.json
sampler:
  num_identities: 8
  num_instances: 2
  fallback_identities: 4
loader:
  num_workers: 0
model:
  name: ResNet18Baseline
  embedding_dim: 256
  pretrained: true
loss:
  name: cosface
  scale: 30.0
  margin: 0.35
training:
  loss_type: cosface
  epochs: 60
  lr: 0.0001
  weight_decay: 0.0001
  grad_accumulation_steps: 4
  lambda_supcon: 0.0
  temperature: 0.07
  amp: true
