# Debug M1 full: P=8 K=2, lr=1e-4
seed: 42
device: cuda
save_dir: experiments/debug_m1_lgfnet_full_p8k2_lr1e4

dataset:
  name: Tongji
  split_file: data/splits/tongji_s1_to_s2.json

sampler:
  num_identities: 8
  num_instances: 2
  fallback_identities: 4

loader:
  num_workers: 0

model:
  name: LGFNetSmall
  embedding_dim: 256
  pretrained: true

training:
  epochs: 1
  lr: 0.0001
  weight_decay: 0.0001
  grad_accumulation_steps: 4
  lambda_supcon: 0.10
  temperature: 0.07
  amp: true