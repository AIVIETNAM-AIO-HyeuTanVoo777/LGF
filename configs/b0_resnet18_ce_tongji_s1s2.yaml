# Debug ResNet18 CE-only on Tongji S1 -> S2
seed: 42
device: cuda
save_dir: experiments/b0_resnet18_ce_tongji_s1s2

dataset:
  name: Tongji
  split_file: data/splits/tongji_s1_to_s2.json

sampler:
  num_identities: 8
  num_instances: 2
  fallback_identities: 4

loader:
  num_workers: 0

model:
  name: ResNet18Baseline
  embedding_dim: 256
  pretrained: true

training:
  epochs: 40
  lr: 0.001
  weight_decay: 0.0001
  grad_accumulation_steps: 4
  lambda_supcon: 0.0
  temperature: 0.07
  amp: true