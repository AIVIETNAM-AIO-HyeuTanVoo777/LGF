seed: 42
device: cuda
save_dir: experiments/b6_resnet18_bnneck_arcface_iitd_subject_disjoint_within_seed42
dataset:
  name: IITD
  split_file: data/splits/iitd_subject_disjoint_within_seed42.json
sampler:
  num_identities: 8
  num_instances: 2
  fallback_identities: 4
loader:
  num_workers: 0
model:
  name: ResNet18BNNeck
  embedding_dim: 256
  pretrained: true
  eval_embedding: post_bn
  bnneck: true
loss:
  name: arcface
  scale: 30.0
  margin: 0.5
  ce: false
  supcon_lambda: 0.0
  supcon_temperature: 0.07
  arcface: true
  arcface_scale: 30.0
  arcface_margin: 0.5
  cosface: false
training:
  epochs: 60
  lr: 0.0001
  weight_decay: 0.0001
  grad_accumulation_steps: 4
  lambda_supcon: 0.0
  temperature: 0.07
  amp: true
  optimizer: Adam
  scheduler: CosineAnnealingLR
  batch_size: 16
  effective_batch_size: 64
  sampler: MPerClassSampler
protocol:
  dataset: IITD
  direction: within
  split_file: data/splits/iitd_subject_disjoint_within_seed42.json
  validation_policy: same_session_development
  test_policy: heldout_gallery_probe_only
checkpoint:
  monitor: validation_eer
  mode: min
  no_test_data: true
