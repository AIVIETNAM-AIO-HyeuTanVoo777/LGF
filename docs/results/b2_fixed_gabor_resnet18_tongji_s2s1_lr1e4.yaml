# B2: Fixed Gabor + ResNet18 on Tongji S2 -> S1
seed: 42
device: cuda
save_dir: experiments/b2_fixed_gabor_resnet18_tongji_s2s1_lr1e4

dataset:
  name: Tongji
  split_file: data/splits/tongji_s2_to_s1.json

sampler:
  num_identities: 8
  num_instances: 2
  fallback_identities: 4

loader:
  num_workers: 0

model:
  name: FixedGaborResNet18
  embedding_dim: 256
  pretrained: true

training:
  epochs: 60
  lr: 0.0001
  weight_decay: 0.0001
  grad_accumulation_steps: 4
  lambda_supcon: 0.10
  temperature: 0.07
  amp: true