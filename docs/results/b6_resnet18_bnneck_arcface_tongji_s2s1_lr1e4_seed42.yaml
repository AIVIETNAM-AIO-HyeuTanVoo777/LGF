# B6: ResNet18 + BNNeck + ArcFace on Tongji S2 -> S1, seed 42
seed: 42
device: cuda
save_dir: experiments/b6_resnet18_bnneck_arcface_tongji_s2s1_lr1e4_seed42

dataset:
  name: Tongji
  split_file: data/splits/tongji_s2_to_s1.json

sampler:
  num_identities: 8
  num_instances: 2
  fallback_identities: 4

loader:
  num_workers: 0

model:
  name: ResNet18BNNeck
  embedding_dim: 256
  pretrained: true
  eval_embedding: post_bn

eval:
  embedding: post_bn

loss:
  name: arcface
  scale: 30.0
  margin: 0.5

training:
  loss_type: arcface
  epochs: 60
  lr: 0.0001
  weight_decay: 0.0001
  grad_accumulation_steps: 4
  lambda_supcon: 0.0
  temperature: 0.07
  amp: true
